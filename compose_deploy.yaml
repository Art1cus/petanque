# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker compose reference guide at
# https://docs.docker.com/compose/compose-file/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  frontend:
    image:  ghcr.io/art1cus/petanque_frontend:latest
    build:
      dockerfile: ./frontend/Dockerfile
      tags:
        - ghcr.io/art1cus/petanque_frontend:latest
      x-bake:
        platforms:
          - linux/arm64
    ports:
      - 88:80

  backend:
    image: ghcr.io/art1cus/petanque_backend:latest
    build:
      dockerfile: ./backend/Dockerfile
      tags:
        - ghcr.io/art1cus/petanque_backend:latest
      x-bake:
        platforms:
          - linux/arm64
    ports:
      - 8000:8000
    environment:
      - PG_DBNAME=petanque
      - PG_HOST=db
      - PG_USER=postgres
      - PG_PASSWORD_FILE=/run/secrets/db-password
      - APP_PASSWORD_FILE=/run/secrets/app-password
      - ADDRESS=0.0.0.0:8000
      - RUST_LOG=debug
    depends_on:
      db:
        condition: service_healthy
    secrets:
      - db-password
      - app-password
  db:
    image: postgres:16
    restart: always
    user: postgres
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=example
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5555:80"
    depends_on:
      - db
    volumes:
      - pgadmin-data:/var/lib/pgadmin
volumes:
  db-data:
  pgadmin-data:
  frontend-target-cache:
  frontend-cargo-registry-cache:
  backend-target-cache:
  backend-cargo-registry-cache:
secrets:
  db-password:
    file: backend/db/password.txt
  app-password:
    file: backend/db/app_password.txt